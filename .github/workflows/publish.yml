name: Release

on:
  workflow_dispatch:

jobs:
  build-native:
    name: Build native binaries (${{ matrix.rid }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - rid: win-x64
            os: windows-latest
          - rid: win-arm64
            os: windows-11-arm
          - rid: linux-x64
            os: ubuntu-latest
          - rid: linux-arm64
            os: ubuntu-24.04-arm
          - rid: osx-x64
            os: macos-13
          - rid: osx-arm64
            os: macos-latest
    permissions:
      contents: read
      actions: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Install dependencies
        run: npm install

      - name: Build CLI binary
        run: node packages/ps/scripts/build-native-all.ts cli ${{ matrix.rid }}

      - name: Build nodeapi binary
        run: node packages/ps/scripts/build-native-all.ts nodeapi ${{ matrix.rid }}

      - name: Upload native binaries
        uses: actions/upload-artifact@v4
        with:
          name: native-${{ matrix.rid }}
          path: packages/ps/bin/
          if-no-files-found: error

  publish:
    name: Publish release
    runs-on: ubuntu-latest
    needs: build-native
    permissions:
      actions: read
      contents: write
      id-token: write
      issues: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: "https://registry.npmjs.org"

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Install dependencies
        run: npm install

      - name: Download native binaries
        uses: actions/download-artifact@v4
        with:
          path: packages/ps/bin
          merge-multiple: true

      - name: Build TypeScript bundle
        run: npm run build -w packages/ps

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test
        env:
          SYSUTILS_PS_TEST_NODEAPI: 1
        run: npm test

      - name: Release to npm and GitHub
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx semantic-release
