name: Release

on:
  workflow_dispatch:

jobs:
  resolve-version:
    name: Resolve release version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      released: ${{ steps.version.outputs.released }}
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v7
        with:
          node-version: lts/*
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: npm ci --no-optional --ignore-scripts

      - name: Resolve next release version
        id: version
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/get-next-version.mjs

  build-and-publish-platform:
    name: Build and publish platform package (${{ matrix.rid }})
    runs-on: ${{ matrix.os }}
    needs: resolve-version
    if: needs.resolve-version.outputs.released == 'true'
    defaults:
      run:
        shell: bash
    strategy:
      fail-fast: false
      matrix:
        include:
          - rid: win-x64
            platform: win32
            arch: x64
            os: windows-latest
          - rid: win-arm64
            platform: win32
            arch: arm64
            os: windows-11-arm
          - rid: linux-x64
            platform: linux
            arch: x64
            os: ubuntu-latest
          - rid: linux-arm64
            platform: linux
            arch: arm64
            os: ubuntu-24.04-arm
          - rid: osx-x64
            platform: darwin
            arch: x64
            os: macos-latest
          - rid: osx-arm64
            platform: darwin
            arch: arm64
            os: macos-latest
    permissions:
      contents: read
      actions: write
      id-token: write
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: lts/*
          registry-url: "https://registry.npmjs.org"

      - uses: actions/setup-dotnet@v6
        with:
          dotnet-version: "10.0.x"

      - name: Install dependencies
        run: npm ci --no-optional --ignore-scripts

      - name: Build CLI binary
        run: node packages/ps/scripts/build-native-all.ts cli ${{ matrix.rid }}

      - name: Build nodeapi binary
        run: node packages/ps/scripts/build-native-all.ts nodeapi ${{ matrix.rid }}

      - name: Upload native binaries
        uses: actions/upload-artifact@v7
        with:
          name: native-${{ matrix.rid }}
          path: packages/ps/bin/
          if-no-files-found: error

      - name: Build platform package
        run: node packages/ps/scripts/build-platform-packages.ts ${{ needs.resolve-version.outputs.version }} ${{ matrix.rid }}

      - name: Check if already published
        id: check
        working-directory: packages/ps/dist-platforms/${{ matrix.platform }}-${{ matrix.arch }}
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          pkg=$(node -p "require('./package.json').name")
          ver=$(node -p "require('./package.json').version")
          if [ -n "$NPM_TOKEN" ]; then
            echo "has-token=true" >> "$GITHUB_OUTPUT"
            # Automation/granular tokens get 403 on profile endpoints (they bypass 2FA).
            # Classic publish tokens can read the profile; if the account has 2FA for writes,
            # the publish will fail with EOTP in non-interactive CI.
            if profile_json=$(npm profile get --json --registry https://registry.npmjs.org 2>/dev/null); then
              tfa_mode=$(node -p "const p=JSON.parse(process.argv[1]); (p.tfa && p.tfa.mode) || ''" "$profile_json")
              if [ "$tfa_mode" = "auth-and-writes" ]; then
                echo "::error::The NPM_TOKEN secret requires 2FA for publish. Create a granular access token with 'bypass 2FA' enabled at https://www.npmjs.com/settings/tokens and set it as NPM_TOKEN, or publish the first version of each @sysutils/ps-* package manually and switch to OIDC trusted publishing for subsequent releases."
                exit 1
              fi
            fi
          else
            echo "has-token=false" >> "$GITHUB_OUTPUT"
          fi
          if npm view "$pkg@$ver" version --silent 2>/dev/null; then
            echo "already-published=true" >> "$GITHUB_OUTPUT"
          else
            echo "already-published=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to npm (token fallback)
        if: steps.check.outputs.already-published == 'false' && steps.check.outputs.has-token == 'true'
        working-directory: packages/ps/dist-platforms/${{ matrix.platform }}-${{ matrix.arch }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public

      - name: Publish to npm (OIDC)
        if: steps.check.outputs.already-published == 'false' && steps.check.outputs.has-token == 'false'
        working-directory: packages/ps/dist-platforms/${{ matrix.platform }}-${{ matrix.arch }}
        run: npm publish --provenance --access public

  publish-main:
    name: Publish @sysutils/ps
    runs-on: ubuntu-latest
    needs: [resolve-version, build-and-publish-platform]
    if: needs.resolve-version.outputs.released == 'true'
    permissions:
      actions: read
      contents: write
      id-token: write
      issues: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v7
        with:
          node-version: lts/*
          registry-url: "https://registry.npmjs.org"

      - uses: actions/setup-dotnet@v6
        with:
          dotnet-version: "10.0.x"

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Download native binaries for this runner
        uses: actions/download-artifact@v8
        with:
          name: native-linux-x64
          path: packages/ps/bin

      - name: Restore executable permissions on Unix binaries
        run: chmod -R +x packages/ps/bin

      - name: Build TypeScript bundle
        run: npm run build -w packages/ps

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test
        env:
          SYSUTILS_PS_TEST_NODEAPI: 1
          SYSUTILS_PS_SKIP_BENCHMARK: 1
        run: npm test

      - name: Set platform optional dependencies
        run: node scripts/set-optional-deps.mjs ${{ needs.resolve-version.outputs.version }}

      - name: Release to npm and GitHub
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./node_modules/.bin/semantic-release
