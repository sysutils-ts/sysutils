name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  node:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"
      - run: npm install
      - run: npm run build:cli -w packages/ps
      - run: npm run build:nodeapi -w packages/ps
      - run: npm run build -w packages/ps
      - run: npm run typecheck
      - run: npm run lint
      - run: npm test
        env:
          SYSUTILS_PS_TEST_NODEAPI: 1
      - run: npm run test:dotnet -w packages/ps

  native:
    strategy:
      fail-fast: false
      matrix:
        rid: [win-x64, win-arm64, linux-x64, linux-arm64, osx-x64, osx-arm64]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"
      - run: node packages/ps/scripts/build-native-all.ts cli ${{ matrix.rid }}
      - run: node packages/ps/scripts/build-native-all.ts nodeapi ${{ matrix.rid }}
