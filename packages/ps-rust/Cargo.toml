[package]
name = "ps"
version = "0.1.0"
edition = "2021"

[[bin]]
name = "ps"
path = "src/main.rs"

[dependencies]
# sysinfo for cross-platform process enumeration.
# Pinned to avoid surprise API drift; update intentionally.
sysinfo = { version = "0.33", default-features = false, features = ["system", "multithread"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

[target.'cfg(windows)'.dependencies]
windows = { version = "0.57", features = ["Win32_Foundation", "Win32_System_Diagnostics_ToolHelp"] }

[profile.release]
opt-level = 3
strip = true
lto = true
codegen-units = 1
panic = "abort"
