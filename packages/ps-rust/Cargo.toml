[package]
name = "ps"
version = "0.0.0"
edition = "2021"

[[bin]]
name = "ps"
path = "src/main.rs"

[dependencies]
# sysinfo for cross-platform process enumeration.
# Pinned to avoid surprise API drift; update intentionally.
sysinfo = "0.33"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

[profile.release]
opt-level = 3
strip = true
lto = true
